<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>HackLog — Bug Bounty Research Tracker</title>
    <meta name="description" content="A Notion-style notes and daily research tracker built for bug bounty hunters. Organize targets, log recon, and track vulnerabilities." />
    <meta name="author" content="HackLog" />
    <meta name="theme-color" content="#0a0d10" />

    <meta property="og:title" content="HackLog — Bug Bounty Research Tracker" />
    <meta property="og:description" content="Notion + Obsidian + a daily research journal, built for bug bounty hunters." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        background: #0a0d10; /* matches your theme */
        color: #e5e7eb;
        font-family: 'Inter', sans-serif;
        z-index: 9999;
      }

      .spinner {
        width: 42px;
        height: 42px;
        border: 4px solid #1f2937;
        border-top: 4px solid #22c55e; /* green accent */
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 12px;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  
  </head>

  <body>
    <div id="root">
      <div id="app-loader">
        <div class="spinner"></div>
        <p>Launching HackLog...</p>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
